services:
  - type: web
    name: elevateai
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 backend.run:app
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///recommender.db
      - key: CORS_ORIGINS
        value: https://elevateai.onrender.com
      - key: CHROMA_ENABLED
        value: false
      - key: PRECOMPUTE_EMBEDDINGS
        value: false
      - key: VITE_API_URL
        value: /api
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
