services:
  - type: web
    name: elevateai
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///recommender.db
      - key: CORS_ORIGINS
        value: https://elevateai.onrender.com
      - key: CHROMA_ENABLED
        value: false
      - key: PRECOMPUTE_EMBEDDINGS
        value: false
      - key: VITE_API_URL
        value: /api
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
