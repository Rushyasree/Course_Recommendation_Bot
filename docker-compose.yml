version: '3.8'

services:
  elevateai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - FLASK_DEBUG=false
      - CHROMA_ENABLED=false
      - PRECOMPUTE_EMBEDDINGS=false
      - DATABASE_URL=sqlite:////app/data/recommender.db
    volumes:
      - elevateai-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  elevateai-data:
